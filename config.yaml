advanced:
  active_architecture: resnet50
  hair_removal_enabled: false
  metadata_fusion_enabled: false
  segmentation_enabled: false
  skintone_filtering_enabled: false
api:
  host: 0.0.0.0
  max_file_size_mb: 10
  port: 8001
data:
  image_size: 224
  mean:
  - 0.485
  - 0.456
  - 0.406
  num_workers: 4
  processed_dir: data/processed
  raw_dir: data/raw
  std:
  - 0.229
  - 0.224
  - 0.225
  train_split: 0.8
inference:
  active_inference_model: resnet50
  collection_dir: data/dataset_queue
  collection_threshold: 0.4
  confidence_threshold: 0.9
  device: cpu
  model_path: models/production/best_3class_legacy.pth
model:
  backbone: resnet50
  class_names:
  - Acne
  - Eczema
  - Herpes
  dropout_rate: 0.5
  num_classes: 3
  pretrained: true
training:
  batch_size: 32
  checkpoint_dir: models/checkpoints
  early_stopping_patience: 5
  epochs: 25
  learning_rate: 0.001
  lr_gamma: 0.1
  lr_step_size: 7
  production_model_path: models/production/best_model_resnet50.pth
  weight_decay: 0.0001
